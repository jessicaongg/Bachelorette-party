<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bachelors — Bridal Party Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{ --cream:#FFF8F1; --plum:#2E1A33; --pink:#FF5D8F; --gold:#E8B84B; --peach:#FFD9C7; --ink:#241220; --line: rgba(46,26,51,0.12); }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--cream); color:var(--ink); font-family:'Nunito Sans',sans-serif; min-height:100vh; }
  h1,h2,h3{ font-family:'Playfair Display', serif; margin:0; }
  .wrap{ max-width:1000px; margin:0 auto; padding:28px 18px 80px; }
  .top{ text-align:center; margin-bottom:18px; }
  .top input{ font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:900; text-align:center;
    border:none; background:transparent; color:var(--plum); width:100%; border-bottom:2px dashed var(--line); padding-bottom:6px; }
  .top input:focus{ outline:none; border-color:var(--pink); }
  .top .desc{ text-align:center; border:none; background:transparent; color:#7a5a68; width:100%; font-size:0.95rem; margin-top:4px;
    font-family:'Nunito Sans',sans-serif; white-space:normal; word-wrap:break-word; resize:none; overflow:hidden; }
  .rolebar{ display:flex; justify-content:flex-end; margin-bottom:10px; gap:8px;}
  .rolebtn{ font-size:0.7rem; padding:5px 10px; opacity:0.6; border-radius:999px; border:2px solid var(--gold); background:transparent; color:var(--plum); font-weight:700; cursor:pointer; }
  .rolebtn.active{ background:var(--gold); opacity:1; }
  .view{ display:none; } .view.active{ display:block; }
  #hostNoSession, #hostLobby, #hostGrid, #hostVoting,
  #noSessionGuest, #claimScreen, #waitingScreen, #votingScreen, #guestResultScreen {
    transition: opacity 0.3s ease;
  }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:16px; }
  .editcard{ background:white; border-radius:18px; padding:14px; border:1px solid var(--line); box-shadow:0 6px 18px rgba(46,26,51,0.06); }
  .photobox{ width:100%; aspect-ratio:1/1; border-radius:14px; background:var(--peach); display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:10px; border:2px dashed var(--gold); }
  .photobox img{ width:100%; height:100%; object-fit:cover; } .photobox span{ color:#a06b3a; font-size:0.8rem; text-align:center; padding:8px;}
  .editcard input[type=file]{ display:none; }
  .uploadbtn{ display:block; text-align:center; font-size:0.78rem; font-weight:700; color:var(--pink); cursor:pointer; margin-bottom:10px; }
  .editcard input[type=text], .editcard textarea{ width:100%; border:1px solid var(--line); border-radius:8px; padding:7px 9px; font-family:'Nunito Sans',sans-serif; margin-bottom:8px; font-size:0.87rem; }
  .editcard label{ font-size:0.7rem; text-transform:uppercase; letter-spacing:0.04em; color:#9a7a86; font-weight:700;}
  .editcard textarea{ resize:vertical; min-height:44px; }
  .pgrid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:18px; }
  .pcard{ background:white; border-radius:20px; overflow:hidden; cursor:pointer; border:1px solid var(--line); box-shadow:0 8px 22px rgba(46,26,51,0.08); transition:transform 0.15s ease; position:relative; }
  .pcard:hover{ transform:translateY(-4px) rotate(-1deg); }
  .pcard .ph{ width:100%; aspect-ratio:4/5; background:var(--peach); } .pcard .ph img{ width:100%; height:100%; object-fit:cover; }
  .pcard .info{ padding:10px 12px; } .pcard .info h3{ font-size:1.05rem; color:var(--plum); } .pcard .info p{ margin:2px 0 0; font-size:0.78rem; color:#8a6b78;}
  .modal-bg{ display:none; position:fixed; inset:0; background:rgba(36,18,32,0.55); align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal-bg.active{ display:flex; }
  .modal{ background:var(--cream); max-width:420px; width:100%; border-radius:22px; overflow:hidden; max-height:90vh; overflow-y:auto; position:relative; }
  .modal .ph{ width:100%; aspect-ratio:1/1; background:var(--peach);} .modal .ph img{ width:100%; height:100%; object-fit:cover;}
  .modal .body{ padding:20px 22px 26px;} .modal h2{ color:var(--plum); font-size:1.4rem;}
  .modal .tagline{ color:var(--pink); font-weight:700; margin:4px 0 14px; font-size:0.9rem;}
  .stat{ margin-bottom:10px;} .stat .k{ font-size:0.68rem; text-transform:uppercase; letter-spacing:0.05em; color:#9a7a86; font-weight:700;} .stat .v{ font-size:0.9rem; margin-top:2px;}
  .closebtn{ position:absolute; top:12px; right:12px; background:white; border:none; border-radius:999px; width:34px; height:34px; font-size:1rem; cursor:pointer; }
  .qbar{ background:var(--plum); color:var(--cream); border-radius:20px; padding:22px; text-align:center; margin-bottom:22px; }
  .qbar .label{ font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold); font-weight:700;}
  .qbar h2{ font-size:1.35rem; margin-top:8px;}
  .livecount{ font-size:0.85rem; color:var(--peach); margin-top:8px; font-weight:700;}
  .votegrid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; }
  .vcard{ background:white; border-radius:16px; padding:10px; text-align:center; cursor:pointer; border:2px solid transparent; transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease; }
  .vcard:hover{ border-color:var(--pink); transform:translateY(-2px); } .vcard.mine{ border-color:var(--gold); background:var(--peach); }
  .vcard .ph{ width:100%; aspect-ratio:1/1; border-radius:12px; background:var(--peach); overflow:hidden; margin-bottom:6px;}
  .vcard .ph img{ width:100%; height:100%; object-fit:cover;} .vcard .name{ font-weight:700; font-size:0.85rem; color:var(--plum);}
  .actionbtn{ background:var(--pink); color:white; border:none; border-radius:999px; padding:12px 28px; font-weight:700; font-size:1rem; cursor:pointer; margin-top:14px; transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .actionbtn:hover{ transform:translateY(-2px); box-shadow:0 6px 16px rgba(255,93,143,0.35); }
  .actionbtn:active{ transform:translateY(0); }
  .actionbtn:disabled{ background:#ccc; cursor:not-allowed; }
  .resultwrap{ display:flex; gap:26px; flex-wrap:wrap; align-items:center; justify-content:center; margin-top:18px;}
  .pie{ width:200px; height:200px; border-radius:50%; flex-shrink:0; }
  .legend .row{ display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:0.85rem;}
  .swatch{ width:13px; height:13px; border-radius:4px; flex-shrink:0; }
  .winnerbox{ margin-top:18px; text-align:center; width:100%; }
  .winnerbox .ph{ width:130px; height:130px; border-radius:50%; overflow:hidden; margin:0 auto 8px; border:4px solid var(--gold);}
  .winnerbox .ph img{ width:100%; height:100%; object-fit:cover;} .winnerbox h3{ color:var(--plum); font-size:1.2rem;}
  .lobbybox{ text-align:center; background:white; border-radius:24px; padding:40px 20px; box-shadow:0 8px 22px rgba(46,26,51,0.08); }
  #qrcode{ display:flex; justify-content:center; margin:18px 0; }
  .joincount{ color:var(--pink); font-weight:700; margin-top:10px; font-size:1.1rem; }
  .bigmsg{ text-align:center; padding:60px 20px; }
  .bigmsg h2{ font-size:1.6rem; color:var(--plum); margin-bottom:10px;}
  .smalllink{ font-size:0.75rem; color:#9a7a86; text-align:center; display:block; margin-top:16px; cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <input id="eventTitle" value="The Bachelors of Ruth's Big Day" />
    <textarea class="desc" id="eventDesc" rows="2">Pick your bachelor,
let's find out who's most likely to....</textarea>
  </div>
  <div class="rolebar"><button class="rolebtn" id="hostBtn" onclick="setRole('host')">Host login</button></div>

  <div class="view active" id="view-setup">
    <div class="grid" id="editGrid"></div>
    <div style="text-align:center; margin-top:20px;">
      <button class="actionbtn" onclick="publishProfiles()">🔒 Publish & Lock Profiles</button>
    </div>
  </div>

  <div class="view" id="view-present">
    <div id="hostNoSession" style="display:none; text-align:center;">
      <div class="lobbybox">
        <h2>Ready to start a game session?</h2>
        <p style="color:#8a6b78; margin-top:8px;">This creates a fresh join code for tonight.</p>
        <button class="actionbtn" onclick="createSession()">🎉 Create Game Session</button>
      </div>
    </div>
    <div id="hostLobby" style="display:none;">
      <div class="lobbybox">
        <h2 id="hostTitleDisplay"></h2>
        <p id="hostDescDisplay" style="color:#8a6b78; margin-top:8px;"></p>
        <div id="qrcode"></div>
        <div class="joincount" id="joinCount">0 joined</div>
        <button class="actionbtn" onclick="goToProfiles()">View Profiles →</button>
      </div>
    </div>
    <div id="hostGrid" style="display:none;">
      <div class="pgrid" id="hostProfileGrid"></div>
      <div style="text-align:center;"><button class="actionbtn" onclick="startGame()">▶ Start Game</button></div>
    </div>
    <div id="hostVoting" style="display:none;">
      <div class="qbar">
        <div class="label">Question <span id="qNum">1</span> / <span id="qTotal"></span></div>
        <h2 id="qText"></h2>
        <div class="livecount" id="liveCount"></div>
      </div>
      <div style="text-align:center;"><button class="actionbtn" id="revealBtn" onclick="reveal()">Reveal Results 🎉</button></div>
      <div class="resultwrap" id="resultWrap" style="display:none;"></div>
      <div style="text-align:center;"><button class="actionbtn" id="nextBtn" onclick="nextQ()" style="display:none;">Next Question →</button></div>
    </div>
    <span class="smalllink" onclick="showSetup()">⚙️ Edit profiles</span>
  </div>

  <div class="view" id="view-game">
    <div id="noSessionGuest" class="bigmsg" style="display:none;"><h2>No active session</h2><p>Ask the host to share the join link or QR code.</p></div>
    <div id="claimScreen" style="display:none;">
      <div class="lobbybox">
        <h2>Who are you?</h2>
        <p style="color:#8a6b78;">Tap your bachelor identity</p>
        <div class="pgrid" id="claimGrid" style="margin-top:16px;"></div>
      </div>
    </div>
    <div id="waitingScreen" class="bigmsg" style="display:none;"><h2 id="waitingMsg">You're locked in!</h2><p>Waiting for the host…</p></div>
    <div id="votingScreen" style="display:none;">
      <div class="qbar">
        <div class="label">Question <span id="gQNum">1</span> / <span id="gQTotal"></span></div>
        <h2 id="gQText"></h2>
      </div>
      <div class="votegrid" id="voteGrid"></div>
    </div>
    <div id="guestResultScreen" style="display:none;">
      <div class="resultwrap" id="guestResultWrap"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalContent"></div></div>

<script>
const NAMES = ["Chad","Brayden","Sebastian","Lorenzo","Kai","Maverick"];
const COLORS = ["#FF5D8F","#E8B84B","#7BA88C","#8E7CC3","#4FA3D1","#E37B5B"];
const SHARE_LINK = "https://jessicaongg.github.io/Bachelorette-party/";
const DB_URL = "https://bacherlorette-b97c6-default-rtdb.asia-southeast1.firebasedatabase.app";
const HOST_PASSWORD = "wpxy";
const deviceId = 'dev' + Math.random().toString(36).slice(2,10);
let role = 'guest';
let myIdentity = null;
let hostViewingProfiles = false;

const urlParams = new URLSearchParams(window.location.search);
let BUCKET = urlParams.get('session'); // Firebase session path segment

let profiles = NAMES.map((n,i)=>({ id:i, photo:null, name:n, age:"", job:"", tagline:"", bio:"", lookingFor:"", funfact:"", redFlags:"", greenFlags:"" }));
let questions = [
  "Most likely to hook up with a wedding guest before the night ends",
  "Most likely to cry harder than the bride during the vows",
  "Most likely to get drunk-texted by an ex mid-ceremony",
  "Most likely to 'lose' the rings on purpose for the drama",
  "Most likely to hijack the mic and turn the toast into a stand-up set",
  "Most likely to get kicked out of the after-party",
  "Most likely to be caught making out in the coat closet",
  "Most likely to swipe right on the officiant",
  "Most likely to start a conga line no one asked for",
  "Most likely to accidentally reveal a secret in their speech",
  "Most likely to end up on the dance floor shirtless",
  "Most likely to still be single at the next wedding"
];
let qIndex = 0;
let myVoteThisQ = null;
let lastNav = { phase:'lobby', qIndex:0, revealed:false };

// ---------- smooth section transitions ----------
function crossfade(sectionIds, targetId, tracker){
  if(tracker.value === targetId){
    document.getElementById(targetId).style.display='block';
    document.getElementById(targetId).style.opacity='1';
    return;
  }
  sectionIds.forEach(id=>{
    const el = document.getElementById(id);
    if(id===targetId){
      el.style.display='block';
      el.style.opacity='0';
      requestAnimationFrame(()=>{ el.style.opacity='1'; });
    } else if(el.style.display !== 'none'){
      el.style.opacity='0';
      setTimeout(()=>{ el.style.display='none'; }, 300);
    } else {
      el.style.display='none';
    }
  });
  tracker.value = targetId;
}
const hostSectionIds = ['hostNoSession','hostLobby','hostGrid','hostVoting'];
const guestSectionIds = ['noSessionGuest','claimScreen','waitingScreen','votingScreen','guestResultScreen'];
const hostTracker = { value: null };
const guestTracker = { value: null };

// ---------- Firebase Realtime Database storage layer (no login required, test mode) ----------
async function fbSet(path, value){
  if(!BUCKET) return false;
  try{
    const r = await fetch(`${DB_URL}/sessions/${BUCKET}/${path}.json`, { method:'PUT', body: JSON.stringify(value) });
    if(!r.ok){ console.error(`fbSet FAILED for "${path}": HTTP ${r.status} — ${await r.text().catch(()=> '')}`); return false; }
    return true;
  }catch(e){ console.error(`fbSet THREW for "${path}":`, e); return false; }
}
async function fbGet(path){
  if(!BUCKET) return null;
  try{
    const r = await fetch(`${DB_URL}/sessions/${BUCKET}/${path}.json`);
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}

function resizeImage(file, maxW){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function setRole(r){
  if(r==='host' && role!=='host'){
    const pw = prompt("Host password:");
    if(pw !== HOST_PASSWORD){ alert("Wrong password."); return; }
  }
  role = r;
  document.getElementById('hostBtn').classList.toggle('active', r==='host');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  if(r==='host'){ document.getElementById('view-present').classList.add('active'); renderHostScreen(); }
  else { document.getElementById('view-game').classList.add('active'); renderGuestScreen(); }
}
function showSetup(){ document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById('view-setup').classList.add('active'); }

function buildEditGrid(){
  const grid = document.getElementById('editGrid'); grid.innerHTML = '';
  profiles.forEach(p=>{
    const card = document.createElement('div'); card.className='editcard';
    card.innerHTML = `
      <div class="photobox" id="photobox-${p.id}">${p.photo ? `<img src="${p.photo}">` : `<span>No photo yet<br>upload the genderbent pic</span>`}</div>
      <label class="uploadbtn">📷 Upload photo<input type="file" accept="image/*" onchange="handlePhoto(event, ${p.id})"></label>
      <label>Bachelor name</label><input type="text" value="${p.name}" oninput="update(${p.id},'name',this.value)">
      <label>Age</label><input type="text" value="${p.age}" oninput="update(${p.id},'age',this.value)">
      <label>Job</label><input type="text" value="${p.job}" oninput="update(${p.id},'job',this.value)">
      <label>Tagline</label><input type="text" value="${p.tagline}" oninput="update(${p.id},'tagline',this.value)">
      <label>Bio</label><textarea oninput="update(${p.id},'bio',this.value)">${p.bio}</textarea>
      <label>Looking for</label><input type="text" value="${p.lookingFor}" oninput="update(${p.id},'lookingFor',this.value)">
      <label>Fun fact</label><input type="text" value="${p.funfact}" oninput="update(${p.id},'funfact',this.value)">
      <label>🚩 Red flags</label><input type="text" value="${p.redFlags}" oninput="update(${p.id},'redFlags',this.value)">
      <label>🟢 Green flags</label><input type="text" value="${p.greenFlags}" oninput="update(${p.id},'greenFlags',this.value)">
    `;
    grid.appendChild(card);
  });
}
async function handlePhoto(e, id){
  const file = e.target.files[0]; if(!file) return;
  const dataUrl = await resizeImage(file, 500);
  profiles.find(p=>p.id===id).photo = dataUrl;
  document.getElementById(`photobox-${id}`).innerHTML = `<img src="${dataUrl}">`;
}
function update(id, field, val){ profiles.find(p=>p.id===id)[field] = val; }

// ---------- session / publish ----------
function createSession(){
  BUCKET = 'sess' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const newUrl = window.location.pathname + '?session=' + encodeURIComponent(BUCKET);
  history.replaceState(null, '', newUrl);
  publishProfiles();
}
async function publishProfiles(){
  if(!BUCKET){ alert('Create a game session first.'); return; }
  let allOk = true;
  allOk = (await fbSet('profiles', profiles)) && allOk;
  allOk = (await fbSet('questions', questions)) && allOk;
  allOk = (await fbSet('meta', {title:document.getElementById('eventTitle').value, desc:document.getElementById('eventDesc').value})) && allOk;
  allOk = (await fbSet('nav', {phase:'lobby', qIndex:0, revealed:false})) && allOk;
  if(!allOk){ alert('Some data failed to save — check the browser console (F12) for "fbSet FAILED" messages and send those to Claude.'); }
  setRole('host');
}

function renderQR(){
  const el = document.getElementById('qrcode');
  if(!BUCKET || !window.QRCode) return;
  if(el.dataset.rendered === BUCKET) return;
  el.innerHTML='';
  const link = SHARE_LINK + '?session=' + encodeURIComponent(BUCKET);
  new QRCode(el, { text: link, width:180, height:180 });
  el.dataset.rendered = BUCKET;
}

// ---------- HOST auto screen ----------
async function renderHostScreen(){
  if(!BUCKET){
    crossfade(hostSectionIds, 'hostNoSession', hostTracker);
    return;
  }

  const meta = await fbGet('meta');
  const p = await fbGet('profiles'); if(p) profiles = p;
  const q = await fbGet('questions'); if(q) questions = q;
  const nav = await fbGet('nav'); if(nav) lastNav = nav;
  qIndex = lastNav.qIndex;
  const claims = await fbGet('claims') || {};
  const claimCount = Object.keys(claims).length;
  let voteCount = 0;
  let pieHTML = '';
  if(lastNav.phase==='voting'){
    const votes = await fbGet(`votes/${qIndex}`) || {};
    voteCount = Object.keys(votes).length;
    if(lastNav.revealed) pieHTML = computePieHTML(tallyFromVotes(votes));
  }

  if(meta){ document.getElementById('hostTitleDisplay').textContent = meta.title; document.getElementById('hostDescDisplay').textContent = meta.desc; }

  if(lastNav.phase==='lobby' && !hostViewingProfiles){
    crossfade(hostSectionIds, 'hostLobby', hostTracker);
    renderQR();
    document.getElementById('joinCount').textContent = `${claimCount} joined`;
  } else if(lastNav.phase==='lobby' && hostViewingProfiles){
    crossfade(hostSectionIds, 'hostGrid', hostTracker);
    buildHostProfileGrid();
  } else if(lastNav.phase==='voting'){
    crossfade(hostSectionIds, 'hostVoting', hostTracker);
    document.getElementById('qNum').textContent = qIndex+1;
    document.getElementById('qTotal').textContent = questions.length;
    document.getElementById('qText').textContent = questions[qIndex]||'';
    document.getElementById('liveCount').textContent = `${voteCount} vote${voteCount!==1?'s':''} cast`;
    if(lastNav.revealed){
      document.getElementById('resultWrap').innerHTML = pieHTML;
      document.getElementById('resultWrap').style.display='flex';
      document.getElementById('nextBtn').style.display='inline-block';
      document.getElementById('revealBtn').style.display='none';
    } else {
      document.getElementById('resultWrap').style.display='none';
      document.getElementById('nextBtn').style.display='none';
      document.getElementById('revealBtn').style.display='inline-block';
    }
  }
}
function goToProfiles(){ hostViewingProfiles = true; renderHostScreen(); }
function buildHostProfileGrid(){
  const grid = document.getElementById('hostProfileGrid'); grid.innerHTML='';
  profiles.forEach(p=>{
    const card = document.createElement('div'); card.className='pcard'; card.onclick=()=>openModal(p.id);
    card.innerHTML = `<div class="ph">${p.photo?`<img src="${p.photo}">`:''}</div><div class="info"><h3>${p.name}${p.age?', '+p.age:''}</h3><p>${p.tagline||''}</p></div>`;
    grid.appendChild(card);
  });
}
function openModal(id){
  const p = profiles.find(x=>x.id===id);
  document.getElementById('modalContent').innerHTML = `
    <button class="closebtn" onclick="closeModal()">✕</button>
    <div class="ph">${p.photo?`<img src="${p.photo}">`:''}</div>
    <div class="body"><h2>${p.name}${p.age?', '+p.age:''}</h2><div class="tagline">${p.tagline||''}</div>
      ${p.job?`<div class="stat"><div class="k">Job</div><div class="v">${p.job}</div></div>`:''}
      <div class="stat"><div class="k">About</div><div class="v">${p.bio||'—'}</div></div>
      <div class="stat"><div class="k">Looking for</div><div class="v">${p.lookingFor||'—'}</div></div>
      <div class="stat"><div class="k">Fun fact</div><div class="v">${p.funfact||'—'}</div></div>
      ${p.redFlags?`<div class="stat"><div class="k">🚩 Red flags</div><div class="v">${p.redFlags}</div></div>`:''}
      ${p.greenFlags?`<div class="stat"><div class="k">🟢 Green flags</div><div class="v">${p.greenFlags}</div></div>`:''}
    </div>`;
  document.getElementById('modalBg').classList.add('active');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('active'); }
document.getElementById('modalBg').addEventListener('click', e=>{ if(e.target.id==='modalBg') closeModal(); });

async function startGame(){ qIndex=0; await fbSet('nav', {phase:'voting', qIndex:0, revealed:false}); renderHostScreen(); }
async function nextQ(){ qIndex=(qIndex+1)%questions.length; await fbSet('nav', {phase:'voting', qIndex, revealed:false}); renderHostScreen(); }

function computePieHTML(counts){
  const total = Object.values(counts).reduce((a,b)=>a+b,0) || 1;
  let start=0;
  const stops = profiles.map((p,i)=>{ const pct=(counts[p.id]||0)/total*100; const seg=`${COLORS[i%COLORS.length]} ${start}% ${start+pct}%`; start+=pct; return seg; }).join(', ');
  const legend = profiles.map((p,i)=>`<div class="row"><div class="swatch" style="background:${COLORS[i%COLORS.length]}"></div>${p.name} — ${counts[p.id]||0} vote${(counts[p.id]||0)!==1?'s':''}</div>`).join('');
  const winner = profiles.reduce((a,b)=> (counts[b.id]||0)>(counts[a.id]||0) ? b : a, profiles[0]);
  return `<div class="pie" style="background: conic-gradient(${stops});"></div>
    <div class="legend">${legend}</div>
    <div class="winnerbox"><div class="ph">${winner.photo?`<img src="${winner.photo}">`:''}</div><h3>👑 ${winner.name} wins this round!</h3></div>`;
}
function tallyFromVotes(votesObj){
  const counts = {}; profiles.forEach(p=>counts[p.id]=0);
  Object.values(votesObj).forEach(v=>{ if(counts[v]!==undefined) counts[v]++; });
  return counts;
}
async function reveal(){
  await fbSet('nav', {phase:'voting', qIndex, revealed:true});
  renderHostScreen();
}

// ---------- GUEST ----------
async function claimIdentity(profileId){ await fbSet(`claims/${deviceId}`, profileId); myIdentity = profileId; renderGuestScreen(); }
function buildClaimGrid(){
  const grid = document.getElementById('claimGrid'); grid.innerHTML='';
  profiles.forEach(p=>{
    const card = document.createElement('div'); card.className='pcard'; card.onclick=()=>claimIdentity(p.id);
    card.innerHTML = `<div class="ph">${p.photo?`<img src="${p.photo}">`:''}</div><div class="info"><h3>${p.name}</h3></div>`;
    grid.appendChild(card);
  });
}
function buildVoteGrid(){
  const grid = document.getElementById('voteGrid'); grid.innerHTML='';
  profiles.forEach(p=>{
    const card = document.createElement('div'); card.className='vcard' + (myVoteThisQ===p.id?' mine':'');
    card.onclick = ()=>castVote(p.id);
    card.innerHTML = `<div class="ph">${p.photo?`<img src="${p.photo}">`:''}</div><div class="name">${p.name}</div>`;
    grid.appendChild(card);
  });
}
async function castVote(profileId){ myVoteThisQ = profileId; await fbSet(`votes/${qIndex}/${deviceId}`, profileId); buildVoteGrid(); }

async function renderGuestScreen(){
  if(!BUCKET){
    crossfade(guestSectionIds, 'noSessionGuest', guestTracker);
    return;
  }

  const p = await fbGet('profiles'); if(p) profiles = p;
  const q = await fbGet('questions'); if(q) questions = q;
  const nav = await fbGet('nav'); if(nav) lastNav = nav;
  if(lastNav.qIndex !== qIndex) myVoteThisQ = null;
  qIndex = lastNav.qIndex;
  let pieHTML = '';
  if(lastNav.phase==='voting' && lastNav.revealed){
    const votes = await fbGet(`votes/${qIndex}`) || {};
    pieHTML = computePieHTML(tallyFromVotes(votes));
  }

  if(myIdentity===null){ crossfade(guestSectionIds, 'claimScreen', guestTracker); buildClaimGrid(); return; }
  if(lastNav.phase==='voting' && !lastNav.revealed){
    crossfade(guestSectionIds, 'votingScreen', guestTracker);
    document.getElementById('gQNum').textContent=qIndex+1; document.getElementById('gQTotal').textContent=questions.length;
    document.getElementById('gQText').textContent=questions[qIndex]||''; buildVoteGrid(); return;
  }
  if(lastNav.phase==='voting' && lastNav.revealed){
    crossfade(guestSectionIds, 'guestResultScreen', guestTracker);
    document.getElementById('guestResultWrap').innerHTML = pieHTML;
    return;
  }
  crossfade(guestSectionIds, 'waitingScreen', guestTracker);
  const me = profiles.find(pr=>pr.id===myIdentity);
  document.getElementById('waitingMsg').textContent = `You're locked in as ${me?me.name:'...'}! Watch the host screen.`;
}

async function pollState(){
  if(document.getElementById('view-setup').classList.contains('active')) return; // don't sync over active edits
  if(role==='host') await renderHostScreen();
  else await renderGuestScreen();
}

buildEditGrid();
setRole('guest');
setInterval(pollState, 2500);
pollState();
</script>
